name: Generate Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Full Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_STATS_TOKEN }}
          user: stellaappiok
          template: classic
          # This base configuration builds the "Statistics" panel
          base: header, activity, community, repositories, metadata
          # This adds the "Languages" panel inside the same image
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 10
          plugin_lines: yes
