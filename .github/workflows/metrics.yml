name: Generate Metrics

on:
  schedule:
    - cron: "0 0 * * *" # Updates automatically at midnight
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # 1. Generates the Languages SVG (Your second image)
      - name: Generate Languages Stats
        uses: lowlighter/metrics@latest
        with:
          filename: github-languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: YOUR_USERNAME_HERE
          base: "" # Turns off the default stats so it only shows languages
          template: classic
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 10

      # 2. Generates the Base Stats SVG (Your first image)
      - name: Generate Base Stats
        uses: lowlighter/metrics@latest
        with:
          filename: github-stats.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: YOUR_USERNAME_HERE
          template: classic
          base: header, activity, community, repositories, metadata
          # Adding plugins for lines of code and other advanced stats
          plugin_lines: yes
