name: Generate Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Side-by-Side Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_STATS_TOKEN }}
          user: stellaappiok
          template: classic
          # This controls the side-by-side layout
          config_order: base.header, base.activity, base.community, base.repositories, base.metadata, plugin_languages
          
          # Base statistics
          base: header, activity, community, repositories, metadata
          
          # Languages plugin
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 10
          
          # Force the side-by-side layout
          config_display: columns
